[main]
dpi-aware=no
min-width=200
max-width=300
max-height=400
layer=overlay

border-radius=8
border-color=cba6f7ff
border-size=0


title-color=a6adc8ff
title-font=monospace:size=13
title-format=<b>%a%A</b>

summary-color=cdd6f4ff
summary-font=monospace:size=11
summary-format=%s


body-color=cdd6f4ff
body-font=monospace:size=11
body-format=%b

background=11111baa
progress-bar-color=6c7086ff

max-timeout=5
default-timeout=5
idle-timeout=5

[critical]
border-color=fab387ff
default-timeout=10
max-timeout=10
