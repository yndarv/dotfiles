output=eDP-1
min-width=100
max-width=300
max-height=0
anchor=top-right
edge-margin-vertical=10
edge-margin-horizontal=10
notification-margin=10
icon-theme=Adwaita
max-icon-size=32
selection-helper=fuzzel
selection-helper-uses-null-separator=no

title-color=a5adcbff
summary-color=cad3f5ff
body-color=cad3f5ff
background=181926ff
border-color=8aadf4ff
progress-bar-color=6e738dff

