output=eDP-1
min-width=200
max-width=500
max-height=0
anchor=top-right
edge-margin-vertical=10
edge-margin-horizontal=10
notification-margin=10
icon-theme=Adwaita
max-icon-size=32
selection-helper=fuzzel
selection-helper-uses-null-separator=no
layer=overlay

edge-margin-vertical=18
edge-margin-horizontal=18

title-color=a6adc8ff
summary-color=cdd6f4ff
body-color=cdd6f4ff
background=1e1e2eff
border-color=89b4faff
progress-bar-color=6c7086ff


border-radius=8
border-size=3

title-font=monospace:size=11
title-format=<b>%a</b>
summary-font=monospace:size=11
summary-format=%s
body-font=monospace:size=11

max-timeout=10
default-timeout=2
idle-timeout=1

[critical]
border-color=fab387ff
