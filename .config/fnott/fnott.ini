output=eDP-1
min-width=200
max-width=500
max-height=0
anchor=top-right
edge-margin-vertical=10
edge-margin-horizontal=10
notification-margin=10
icon-theme=Adwaita
max-icon-size=32
selection-helper=fuzzel
selection-helper-uses-null-separator=no
layer=overlay

edge-margin-vertical=18
edge-margin-horizontal=18

title-color=a5adcbff
summary-color=cad3f5ff
body-color=cad3f5ff
background=181926aa
border-color=8aadf4ff
progress-bar-color=6e738dff

border-radius=8
border-size=3

title-font=monospace:size=11
title-format=<b>%a</b>
summary-font=monospace:size=11
summary-format=%s
body-font=monospace:size=11

max-timeout=10
default-timeout=2
idle-timeout=1

[critical]
border-color=f5a97fff
