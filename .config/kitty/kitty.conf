font_size 15
cursor_blink_interval 0
cursor_trail 1
cursor_trail_start_threshold 4
copy_on_select yes


# BEGIN_KITTY_THEME
# Tokyo Night
include current-theme.conf
# END_KITTY_THEME


# BEGIN_KITTY_FONTS
font_family      family="monospace"
bold_font        auto
italic_font      family="monospace"
bold_italic_font auto
# END_KITTY_FONTS
